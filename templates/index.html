
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
body{
    font-family: Arial;
    background:#f2f2f2;
    display:grid;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

input,select{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}
h2,h3{
    background: #0056b3;
    border: 3px solid #007BFF;
    border-radius: 30px;
    color: white;
    padding: 10px 20px;
    display: inline-block;
    text-align: center;


}
</style>
<link rel="icon" href="{{ url_for('static', filename='favicon.png') }}">

    <title>Python Calculator</title>

</head>
<body>
    <h2>Calculator</h2>
    <form method="POST">
        <input type="number" name="num1" placeholder="First number" required>
        <br><br>
        <input type="number" name="num2" placeholder="Second number" required>
         <br><br>
         <select name="operation">
            <option value="add">Add</option>
            <option value="sub">Subtract</option>
            <option value="mul">Multiply</option>
            <option value="div">Divide</option>
         </select>
          <br><br>
          <button type="submit">Calculate</button>
    </form>
    {% if result is not none %}
    <h3>Result: {{result}}</h3>
    {% endif %}
</body>
</html>
